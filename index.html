<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Для любимой Кати</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #ffffff; /* Чистый белый фон */
      font-family: sans-serif;
      touch-action: none;
    }
    #compliments-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      pointer-events: none;
    }
    #3d-container {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 2;
    }
    .hint {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: rgba(154, 122, 82, 0.6);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <canvas id="compliments-canvas"></canvas>

  <div id="3d-container"></div>
  
  <div class="hint">Проведи пальцем или курсором по сердцу</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    /* === 1. СПИСОК ИЗ 52 КОМПЛИМЕНТОВ === */
    const complimentWords = [
      "Ты самая милая", "Ты самая красивая", "Моя вселенная", "Любимая", "Невероятная", 
      "Улыбнись, тебе идет", "Самая нежная", "Очаровательная", "Моё счастье", "Восхитительная",
      "Ты согреваешь душу", "Драгоценная моя", "Прекрасная", "Ангел мой", "Ты уникальна",
      "Самая родная", "Магнит для моих глаз", "Ты вдохновение", "Единственная", "Чудесная",
      "Слепишь красотой", "Лучшее, что есть в жизни", "Моё солнышко", "Обожаю твой смех", "Ты само совершенство",
      "Королева моего сердца", "Ты даришь радость", "Утонченная", "Безумно красивая", "Сердцу дорогая",
      "Ты мое всё", "Ласковая", "Незабываемая", "Свет моих очей", "Ты манишь меня",
      "Самая стильная", "Головокружительная", "Ты милашка", "Моя гордость", "Счастье быть с тобой",
      "Ты идеальна", "Самая чуткая", "Колдовские глаза", "Ты мой уют", "Бесценная",
      "Ты сияешь", "Серце бьется ради тебя", "Сказочная", "Моя муза", "Ты даришь крылья",
      "Самая-самая", "Люблю тебя без ума"
    ];

    /* === 2. АНИМАЦИЯ ПАДАЮЩИХ КОМПЛИМЕНТОВ === */
    const compCanvas = document.getElementById('compliments-canvas');
    const compCtx = compCanvas.getContext('2d');
    let compliments = [];

    function resizeCompCanvas() {
      compCanvas.width = window.innerWidth;
      compCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCompCanvas);
    resizeCompCanvas();

    function createCompliment(isInitial = false) {
      const text = complimentWords[Math.floor(Math.random() * complimentWords.length)];
      const fontSize = window.innerWidth < 600 ? Math.floor(16 + Math.random() * 8) : Math.floor(22 + Math.random() * 12);
      
      return {
        text: text,
        x: Math.random() * compCanvas.width,
        y: isInitial ? Math.random() * compCanvas.height : -50,
        speed: 0.35 + Math.random() * 0.5,
        alpha: 0.15 + Math.random() * 0.25,
        font: `${fontSize}px 'Great Vibes', cursive`,
        waveSpeed: 0.008 + Math.random() * 0.01,
        waveAngle: Math.random() * Math.PI * 2,
        waveRange: 8 + Math.random() * 12
      };
    }

    for(let i = 0; i < 38; i++) {
      compliments.push(createCompliment(true));
    }

    function drawCompliments() {
      compCtx.clearRect(0, 0, compCanvas.width, compCanvas.height);
      
      compliments.forEach((c, idx) => {
        c.y += c.speed;
        c.waveAngle += c.waveSpeed;
        const currentX = c.x + Math.sin(c.waveAngle) * c.waveRange;

        compCtx.save();
        compCtx.font = c.font;
        compCtx.fillStyle = `rgba(186, 92, 106, ${c.alpha})`;
        compCtx.textAlign = 'center';
        compCtx.fillText(c.text, currentX, c.y);
        compCtx.restore();

        if (c.y > compCanvas.height + 40) {
          compliments[idx] = createCompliment(false);
        }
      });
    }


    /* === 3. ТРЕХМЕРНАЯ СЦЕНА THREE.JS === */
    const container = document.getElementById('3d-container');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, window.innerWidth < 600 ? 14 : 11);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableRotate = false; 
    controls.enableZoom = false;
    controls.enablePan = false;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-1000, -1000);
    
    const targetPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    scene.add(targetPlane);

    // Стабильная и объемная 3D-модель сердца
    const particleCount = window.innerWidth < 600 ? 15000 : 25000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);     
    const basePositions = new Float32Array(particleCount * 3); 
    const velocities = new Float32Array(particleCount * 3);    

    for (let i = 0; i < particleCount; i++) {
      const phi = Math.PI * Math.random();
      const theta = Math.PI * 2 * Math.random();

      const sinPhi = Math.sin(phi);
      const x = 16 * Math.pow(Math.sin(theta), 3) * sinPhi;
      const y = (13 * Math.cos(theta) - 5 * Math.cos(2 * theta) - 2 * Math.cos(3 * theta) - Math.cos(4 * theta)) * sinPhi;
      const z = 10 * Math.cos(phi); 

      const fillScale = 0.05 + Math.random() * 0.95;
      
      let px = x * fillScale * 0.18;
      let py = y * fillScale * 0.18 - 0.8; // Смещено вниз, чтобы освободить место под каллиграфию
      let pz = z * fillScale * 0.18;

      const i3 = i * 3;
      positions[i3] = basePositions[i3] = px;
      positions[i3+1] = basePositions[i3+1] = py;
      positions[i3+2] = basePositions[i3+2] = pz;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const pCanvas = document.createElement('canvas');
    pCanvas.width = 32; pCanvas.height = 32;
    const pCtx = pCanvas.getContext('2d');
    const grad = pCtx.createRadialGradient(16, 16, 0, 16, 16, 14);
    grad.addColorStop(0, 'rgba(197, 45, 66, 1)'); 
    grad.addColorStop(0.5, 'rgba(197, 45, 66, 0.85)');
    grad.addColorStop(1, 'rgba(197, 45, 66, 0)');  
    pCtx.fillStyle = grad; pCtx.fillRect(0, 0, 32, 32);
    
    const material = new THREE.PointsMaterial({
      color: new THREE.Color('#bd263c'), 
      size: window.innerWidth < 600 ? 0.13 : 0.09,
      transparent: true,
      blending: THREE.NormalBlending, 
      depthWrite: false,
      map: new THREE.CanvasTexture(pCanvas)
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);


    /* === 4. КРАСИВЫЙ РУКОПИСНЫЙ ТЕКСТ В ВЫСОКОМ РАЗРЕШЕНИИ === */
    const textCanvas = document.createElement('canvas');
    // Увеличиваем текстуру в 2 раза для максимальной четкости завитков шрифта
    textCanvas.width = 2048;
    textCanvas.height = 512;
    const tCtx = textCanvas.getContext('2d');

    // Настраиваем идеальный каллиграфический размер
    tCtx.font = "116px 'Great Vibes', cursive";
    tCtx.textAlign = "center";
    tCtx.textBaseline = "middle";
    
    // Благородный бордово-красный цвет
    tCtx.fillStyle = "#6b1824";
    
    // Элегантная мягкая тень под буквами для 3D-эффекта
    tCtx.shadowColor = "rgba(189, 38, 60, 0.3)";
    tCtx.shadowBlur = 12;
    
    // Отрисовываем текст в две строчки с хорошим отступом
    tCtx.fillText("Я тебя очень сильно люблю", textCanvas.width / 2, 160);
    tCtx.fillText("моя Катя", textCanvas.width / 2, 340);

    const textTexture = new THREE.CanvasTexture(textCanvas);
    
    // Анизотропная фильтрация, чтобы под углами шрифт не размывался на экранах телефонов
    textTexture. anisotropy = 4; 

    const textMaterial = new THREE.MeshBasicMaterial({
      map: textTexture,
      transparent: true,
      side: THREE.DoubleSide
    });
    
    // Размеры 3D-плоскости под пропорции холста 4:1 (2048x512)
    const textMesh = new THREE.Mesh(new THREE.PlaneGeometry(10, 2.5), textMaterial);
    textMesh.position.set(0, 4.0, 0); // Идеальное положение над статичным сердцем
    scene.add(textMesh);


    /* === 5. ИНТЕРАКТИВ И ОБНОВЛЕНИЕ === */
    function updateMouse(x, y) {
      mouse.x = (x / window.innerWidth) * 2 - 1;
      mouse.y = -(y / window.innerHeight) * 2 + 1;
    }

    window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      if(e.touches.length > 0) updateMouse(e.touches[0].clientX, e.touches[0].clientY);
    });
    window.addEventListener('touchend', () => mouse.set(-1000, -1000));
    window.addEventListener('mouseleave', () => mouse.set(-1000, -1000));

    function animate() {
      requestAnimationFrame(animate);

      // Отрисовка бэкграунда
      drawCompliments();

      // Физика отталкивания точек
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(targetPlane);
      let mouse3D = null;
      if (intersects.length > 0) {
        mouse3D = intersects[0].point;
      }

      const posAttribute = geometry.attributes.position;
      const posArray = posAttribute.array;

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        let px = posArray[i3], py = posArray[i3+1], pz = posArray[i3+2];
        const bx = basePositions[i3], by = basePositions[i3+1], bz = basePositions[i3+2];

        velocities[i3]   += (bx - px) * 0.045; 
        velocities[i3+1] += (by - py) * 0.045;
        velocities[i3+2] += (bz - pz) * 0.045;

        if (mouse3D) {
          const mdx = px - mouse3D.x, mdy = py - mouse3D.y, mdz = pz - mouse3D.z;
          const distSq = mdx*mdx + mdy*mdy + mdz*mdz;
          const radiusSq = window.innerWidth < 600 ? 2.0 : 3.2;

          if (distSq < radiusSq) {
            const dist = Math.sqrt(distSq);
            const force = (1.0 - dist / Math.sqrt(radiusSq)) * 0.32;
            const push = force / (dist + 0.001);
            velocities[i3]   += mdx * push;
            velocities[i3+1] += mdy * push;
            velocities[i3+2] += mdz * push;
          }
        }

        velocities[i3] *= 0.84; velocities[i3+1] *= 0.84; velocities[i3+2] *= 0.84;

        posArray[i3]   += velocities[i3];
        posArray[i3+1] += velocities[i3+1];
        posArray[i3+2] += velocities[i3+2];
      }

      posAttribute.needsUpdate = true;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      camera.position.set(0, 0, window.innerWidth < 600 ? 14 : 11);
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
